<!DOCTYPE html>
<html>
<head>
    <title>Success</title>
</head>
<body>

<h2>Registered Users</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>Email</th>
</tr>

{% for user in users %}
<tr>
    <td>{{ user.firstname }} {{ user.lastname }}</td>
    <td>{{ user.email }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
